<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Message</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  width:90%;
  max-width:500px;
  max-height:80vh;
  background:#111;
  padding:20px;
  border-radius:20px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

h1 {
  text-align:center;
  margin-bottom:10px;
  color:#ff7eb6;
}

.text {
  overflow-y:auto;
  flex:1;
  line-height:1.8;
}
</style>

</head>

<body>

<div class="card">
  <h1>من اجلك</h1>
  <div class="text">
    بصي يا حبيبة انا عارف اني اديتك وعد...
    <br><br>
    (حط النص كله هنا وهيعمل scroll تلقائي)
  </div>
</div>

</body>
</html>
